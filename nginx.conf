# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name senhaoexpo.com www.senhaoexpo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name senhaoexpo.com www.senhaoexpo.com;

    ssl_certificate     /etc/nginx/ssl/senhaoexpo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/senhaoexpo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/website/worldex/worldex-front/dist;
    index index.html;

    # 静态资源 —— 长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 回退 —— 非文件请求走 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }
}
